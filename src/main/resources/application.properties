spring.application.name=ecomerce
spring.datasource.url=jdbc:mysql://localhost:4000/ecomerce_db?sslMode=DISABLED&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT (dev defaults). Override via env vars in production.
app.security.jwt.secret=${JWT_SECRET:dev-secret-change-me-dev-secret-change-me-dev-secret-change-me}
app.security.jwt.ttl-seconds=${JWT_TTL_SECONDS:3600}

# Nexar OAuth2 + GraphQL settings. Keep credentials in environment variables.
nexar.graphql-url=${NEXAR_GRAPHQL_URL:https://api.nexar.com/graphql}
nexar.default-limit=${NEXAR_DEFAULT_LIMIT:20}
nexar.oauth.token-url=${NEXAR_TOKEN_URL:https://identity.nexar.com/connect/token}
nexar.oauth.client-id=${NEXAR_CLIENT_ID:}
nexar.oauth.client-secret=${NEXAR_CLIENT_SECRET:}
nexar.oauth.scope=${NEXAR_SCOPE:supply.domain}

# Mouser API settings
mouser.api.key=${MOUSER_API_KEY:d461dd97-cec6-453e-8934-435f32b8befa}

# Inventory early warning
app.inventory.low-stock-threshold=${LOW_STOCK_THRESHOLD:20}
